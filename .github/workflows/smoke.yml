name: Smoke Tests

on:
  push:
    branches:
      - main
      - "feat/**"
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1a: Unit tests (debug build — 2-3x faster than release) ───────────────
  test:
    name: Unit & integration tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install libpq
        run: sudo apt-get update && sudo apt-get install -y libpq-dev

      - name: Pre-pull Postgres image
        run: docker pull postgres:11-alpine

      - name: Run rsky-pds tests
        run: |
          PDS_ADMIN_PASS=ci-admin-pass \
          PDS_SERVICE_DID=did:web:localhost \
          PDS_JWT_KEY_K256_PRIVATE_KEY_HEX=$(openssl rand -hex 32) \
          PDS_PLC_ROTATION_KEY_K256_PRIVATE_KEY_HEX=$(openssl rand -hex 32) \
          PDS_REPO_SIGNING_KEY_K256_PRIVATE_KEY_HEX=$(openssl rand -hex 32) \
          cargo test -p rsky-pds

  # ── Job 1b: Release binary + Docker images (runs in parallel with test) ────────
  # Compiles on the host so Swatinem's incremental cache applies.
  # Assembles a minimal runtime image (binary copy only, ~10s).
  build:
    name: Build rsky-pds image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install libpq
        run: sudo apt-get update && sudo apt-get install -y libpq-dev

      - name: Build rsky-pds binary
        run: cargo build -p rsky-pds

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and cache rsky-pds runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.runtime
          load: true
          tags: rsky-pds-dev:latest
          # Binary changes every commit so no benefit caching the COPY layer;
          # only the base apt layer is worth caching.
          cache-from: type=gha,scope=rsky-pds-runtime
          cache-to:   type=gha,scope=rsky-pds-runtime,mode=max

      - name: Build and cache plc image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.plc
          load: true
          tags: plc-dev:latest
          cache-from: type=gha,scope=plc-dev
          cache-to:   type=gha,scope=plc-dev,mode=max

      - name: Export images to tarballs
        run: |
          docker save rsky-pds-dev:latest | gzip > /tmp/rsky-pds-dev.tar.gz
          docker save plc-dev:latest      | gzip > /tmp/plc-dev.tar.gz

      - name: Upload image artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rsky-pds-image
          path: |
            /tmp/rsky-pds-dev.tar.gz
            /tmp/plc-dev.tar.gz
          retention-days: 1

  # ── Job 2: Stack smoke tests ─────────────────────────────────────────────────
  smoke:
    name: Stack smoke tests
    runs-on: ubuntu-latest
    needs: [test, build]

    steps:
      - uses: actions/checkout@v4

      - name: Download pre-built images
        uses: actions/download-artifact@v4
        with:
          name: rsky-pds-image
          path: /tmp

      - name: Load images into Docker
        run: |
          docker load < /tmp/rsky-pds-dev.tar.gz
          docker load < /tmp/plc-dev.tar.gz

      - name: Generate crypto keys
        id: keys
        run: |
          echo "jwt=$(openssl rand -hex 32)"  >> "$GITHUB_OUTPUT"
          echo "plc=$(openssl rand -hex 32)"  >> "$GITHUB_OUTPUT"
          echo "repo=$(openssl rand -hex 32)" >> "$GITHUB_OUTPUT"

      - name: Write docker/.env
        run: |
          sed \
            -e "s|^PDS_JWT_KEY_K256_PRIVATE_KEY_HEX=.*|PDS_JWT_KEY_K256_PRIVATE_KEY_HEX=${{ steps.keys.outputs.jwt }}|" \
            -e "s|^PDS_PLC_ROTATION_KEY_K256_PRIVATE_KEY_HEX=.*|PDS_PLC_ROTATION_KEY_K256_PRIVATE_KEY_HEX=${{ steps.keys.outputs.plc }}|" \
            -e "s|^PDS_REPO_SIGNING_KEY_K256_PRIVATE_KEY_HEX=.*|PDS_REPO_SIGNING_KEY_K256_PRIVATE_KEY_HEX=${{ steps.keys.outputs.repo }}|" \
            docker/.env.example > docker/.env

      - name: Start stack (no build — uses pre-loaded images)
        run: |
          docker compose \
            -f docker/docker-compose.yml \
            -f docker/docker-compose.ci.yml \
            --env-file docker/.env \
            up -d --no-build

      - name: Wait for rsky-pds
        run: |
          retries=60
          until curl -sf http://localhost:2583/xrpc/com.atproto.server.describeServer > /dev/null; do
            retries=$((retries - 1))
            [ "$retries" -gt 0 ] || { echo "rsky-pds never became ready"; exit 1; }
            sleep 5
          done

      - name: Create smoke-test accounts
        run: |
          PDS_URL="http://localhost:2583"
          create_account() {
            curl -sf -X POST "$PDS_URL/xrpc/com.atproto.server.createAccount" \
              -H "Content-Type: application/json" \
              -d "{\"handle\":\"$1\",\"email\":\"$2\",\"password\":\"$3\"}" \
              | jq -r '"Created \(.handle) — \(.did)"'
          }
          create_account alice.test alice@localhost alice-ci-pass
          create_account bob.test   bob@localhost   bob-ci-pass

      - name: Verify stack endpoints
        run: bash scripts/verify-stack.sh

      - name: Collect logs on failure
        if: failure()
        run: |
          docker compose \
            -f docker/docker-compose.yml \
            -f docker/docker-compose.ci.yml \
            --env-file docker/.env \
            logs --no-color 2>&1 | tail -300
