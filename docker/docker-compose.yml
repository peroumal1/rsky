# Local development stack for rsky-pds.
# Bring up with: docker compose -f docker/docker-compose.yml --env-file docker/.env up
#
# First-time setup: run scripts/setup-local.sh after the stack is healthy.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rsky
      POSTGRES_PASSWORD: rsky
      POSTGRES_DB: rsky_pds
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rsky -d rsky_pds"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot container that creates the MinIO bucket on first start.
  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${AWS_ACCESS_KEY_ID:-minioadmin} ${AWS_SECRET_ACCESS_KEY:-minioadmin};
        mc mb --ignore-existing local/${AWS_ENDPOINT_BUCKET:-rsky-pds-blobs};
        mc anonymous set public local/${AWS_ENDPOINT_BUCKET:-rsky-pds-blobs};
        exit 0
      "
    restart: "no"

  rsky-pds:
    image: rsky-pds-dev:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      # Rocket overrides — keeps the binary listening on all interfaces
      ROCKET_ADDRESS: "0.0.0.0"
      ROCKET_PORT: "${PDS_PORT:-2583}"
      # Point at the compose-internal service names
      DATABASE_URL: "postgresql://rsky:rsky@postgres:5432/rsky_pds"
      AWS_ENDPOINT: "http://minio:9000"
    ports:
      - "${PDS_PORT:-2583}:${PDS_PORT:-2583}"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:${PDS_PORT:-2583}/xrpc/com.atproto.server.describeServer || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  postgres_data:
  minio_data:
